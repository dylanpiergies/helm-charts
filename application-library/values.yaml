# Default values for application-library.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

controllerType: Deployment

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

containerPorts:
- name: http
  containerPort: 8080
  protocol: TCP

service:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http

env: ""
# Environment variable configuration. THis is specified as a string and is passed into the
# template engine.
# env: |-
#   - name: DATABASE_HOST
#     valueFrom:
#       secretKeyRef:
#         name: {{ include "application-library.fullname" . }}-database
#         key: jdbc-url
#   - name: DATABASE_USERNAME
#     valueFrom:
#       secretKeyRef:
#         name: {{ include "application-library.fullname" . }}-database
#         key: username
#   - name: DATABASE_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: {{ include "application-library.fullname" . }}-database
#         key: password
extraEnv: ""
# Behaves the same as env. It allows additional environment to be specified without
# overwriting the main env.

volumeMounts: []
# - mountPath: /data
#   name: data-volume
volumes: ""
# volumes: |-
#   - name: temp-data-volume
#     emptyDir: {}
#
# Or if you have a persistent volume:
#
# volumes: |-
#   - name: data-volume
#     persistentVolumeClaim:
#       claimName: {{ include "application-library.fullname" . }}-data

ingress:
  enabled: false
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  servicePort: http
  hosts:
  - host: chart-example.local
    paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: ""

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http
